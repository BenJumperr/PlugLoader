    - "&#3C3C3C» &#D6D900/plugloader disable <id> &#3B3B3B・ &#00CDBCDisables the specified plugin."
    - "&#3C3C3C» &#D6D900/plugloader enable <id> &#3B3B3B・ &#00CDBCEnables the specified plugin."
    - "&#3C3C3C» &#D6D900/plugloader info <id> &#3B3B3B・ &#00CDBCShow detailed information about the specified plugin."
