    - "&#3C3C3C» &#D6D900/plugloader &#3B3B3B・ &#00CDBCDisplays the PlugLoader help message."
    - "&#3C3C3C» &#D6D900/plugloader cache clear &#3B3B3B・ &#00CDBCClears the cache in the libs/cache directory."
    - "&#3C3C3C» &#D6D900/plugloader compile <id> &#3B3B3B・ &#00CDBCRecompiles the source of the specified plugin."
